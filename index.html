<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java DSA Interactive Mastery | Syntax & Patterns</title>
    <meta name="description" content="A premium interactive learning tool for mastering Java syntax for Data Structures and Algorithms.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            /* Color Palette - Premium Dark Theme */
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #818cf8;
            --accent-secondary: #6366f1;
            --success: #34d399;
            --error: #fb7185;
            --warning: #fbbf24;
            --code-bg: #1e293b;
            
            /* Spacing & Radii */
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            
            /* Fonts */
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(129, 140, 248, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.12) 0px, transparent 50%);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 850px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #a5b4fc, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .search-box {
            position: relative;
            flex: 1;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 10px 16px 10px 40px;
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .view-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: var(--radius-md);
            border: 1px solid var(--card-border);
        }

        .view-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: var(--accent-primary);
            color: white;
        }

        /* Progress Bar */
        .progress-container {
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 999px;
            margin-bottom: 2rem;
            overflow: hidden;
            border: 1px solid var(--card-border);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            width: 0%;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 10px rgba(129, 140, 248, 0.4);
        }

        /* Navigation Pills */
        .pill-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pill:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .pill.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .pill.completed {
            border-color: var(--success);
            color: var(--success);
        }

        .pill.struggling {
            border-color: var(--error);
            color: var(--error);
        }

        /* Main Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0.8;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            background: rgba(129, 140, 248, 0.1);
            color: var(--accent-primary);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .intro {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        /* Code Snippet */
        .snippet-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .snippet {
            background: var(--code-bg);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            line-height: 1.7;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        /* Syntax Highlighting */
        .kw { color: #818cf8; font-weight: 500; } /* Keyword */
        .cm { color: #64748b; font-style: italic; } /* Comment */
        .str { color: #34d399; } /* String */
        .num { color: #fbbf24; } /* Number */
        .typ { color: #38bdf8; } /* Type */
        .mtd { color: #f472b6; } /* Method */

        .tip-box {
            background: rgba(129, 140, 248, 0.05);
            border-left: 4px solid var(--accent-primary);
            padding: 1rem 1.25rem;
            border-radius: var(--radius-sm);
            margin-bottom: 2rem;
            font-size: 0.925rem;
            color: #c7d2fe;
        }

        .tip-box strong {
            color: var(--accent-primary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 4px;
        }

        /* Quiz Section */
        .quiz-section {
            border-top: 1px solid var(--card-border);
            padding-top: 2rem;
        }

        .quiz-q {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 600px) {
            .quiz-options { grid-template-columns: 1fr; }
        }

        .quiz-opt {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 14px;
            border-radius: var(--radius-md);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            font-family: inherit;
        }

        .quiz-opt:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .quiz-opt.correct {
            background: rgba(52, 211, 153, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        .quiz-opt.wrong {
            background: rgba(251, 113, 133, 0.1);
            border-color: var(--error);
            color: var(--error);
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1.25rem;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            display: none;
            animation: slideIn 0.3s ease-out;
            line-height: 1.6;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.ok { background: rgba(52, 211, 153, 0.05); color: var(--success); border: 1px solid rgba(52, 211, 153, 0.2); }
        .feedback.bad { background: rgba(251, 113, 133, 0.05); color: var(--error); border: 1px solid rgba(251, 113, 133, 0.2); }

        .feedback-title {
            display: block;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .feedback-content {
            display: block;
        }

        .correct-answer-hint {
            display: block;
            margin-top: 0.75rem;
            font-weight: 600;
            color: var(--success);
        }

        /* Navigation Buttons */
        .nav-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 2.5rem;
            gap: 1rem;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .nav-btn.primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Analysis Table */
        .analysis-container {
            margin-top: 2rem;
            width: 100%;
        }

        .analysis-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--card-border);
        }

        .analysis-label {
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .analysis-bar-container {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
            margin: 0 1.5rem;
            overflow: hidden;
        }

        .analysis-bar {
            height: 100%;
            background: var(--accent-primary);
            border-radius: 999px;
            transition: width 1s ease-out;
        }

        .analysis-score {
            font-size: 0.85rem;
            color: var(--text-secondary);
            width: 60px;
            text-align: right;
        }

        /* Reset Button */
        .reset-btn {
            display: block;
            margin: 2rem auto 0;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.6;
        }

        .reset-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Java DSA Mastery</h1>
            <p>Adaptive quizzes that analyze your weaknesses and track your growth.</p>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Search syntax (e.g. 'sort', 'map')..." oninput="handleSearch()">
            </div>
            <div class="view-toggle">
                <button id="stepViewBtn" class="view-btn active" onclick="setView('step')">Learning</button>
                <button id="cheatViewBtn" class="view-btn" onclick="setView('cheat')">Cheat Sheet</button>
                <button id="analysisViewBtn" class="view-btn" onclick="setView('analysis')">Analysis</button>
            </div>
        </div>

        <div id="stepHeader">
            <div class="progress-container">
                <div class="progress-fill" id="prog"></div>
            </div>
            <nav class="pill-nav" id="pillNav"></nav>
        </div>

        <main id="mainContent"></main>

        <button class="reset-btn" onclick="resetProgress()">Reset All Progress</button>
    </div>

    <script>
        const pillars = [
            {
                id: 0,
                label: "Data Types",
                icon: "💎",
                badge: "Pillar 1",
                intro: "Core primitives and essential character arithmetic used in String manipulation.",
                code: `<span class="kw">int</span> n = <span class="num">10</span>;
<span class="kw">long</span> big = <span class="num">10_000_000_000L</span>;

<span class="cm">// Char arithmetic - essential for hashing</span>
<span class="kw">char</span> ch = <span class="str">'e'</span>;
<span class="kw">int</span> pos = ch - <span class="str">'a'</span>;    <span class="cm">// → 4</span>`,
                tip: "The 'ch - 'a'' trick is the most common way to build frequency maps for anagram problems without using a full HashMap.",
                quizzes: [
                    { 
                        q: "What does 'c' - 'a' evaluate to?", 
                        opts: ["1", "2", "3", "67"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. 1 would be 'b' - 'a'. Remember that 'a' is 0 in 0-indexed positioning.",
                            "Correct! 'a' is 0, 'b' is 1, and 'c' is 2. (99 - 97 = 2).",
                            "Incorrect. 3 would be 'd' - 'a'. Counts start from 0.",
                            "Incorrect. 67 is the ASCII value of 'C', but the subtraction 'c' - 'a' results in the relative offset."
                        ]
                    },
                    { 
                        q: "Which type should you use for numbers exceeding 2 billion?", 
                        opts: ["int", "short", "long", "float"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. 'int' caps at ~2.14 billion. Numbers larger than this will overflow and wrap around to negative.",
                            "Incorrect. 'short' is even smaller than 'int', capping at 32,767.",
                            "Correct! 'long' is a 64-bit integer that can store extremely large values (up to 9 quintillion).",
                            "Incorrect. 'float' is for decimals. For large whole numbers, 'long' is more precise and appropriate."
                        ]
                    },
                    { 
                        q: "What is the ASCII value of 'A'?", 
                        opts: ["65", "97", "48", "0"], 
                        ans: 0, 
                        explains: [
                            "Correct! 'A' starts at 65. Remember this for uppercase character logic.",
                            "Incorrect. 97 is the ASCII value for lowercase 'a'.",
                            "Incorrect. 48 is the ASCII value for the character '0'.",
                            "Incorrect. 0 is the null character, not 'A'."
                        ]
                    }
                ]
            },
            {
                id: 1,
                label: "Arrays",
                icon: "📊",
                badge: "Pillar 2",
                intro: "Fixed-size collections. Mastering length access and static utility methods.",
                code: `<span class="kw">int</span>[] arr = {<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>};
<span class="kw">int</span> len = arr.length; <span class="cm">// Field, no ()</span>
Arrays.sort(arr);      <span class="cm">// O(n log n)</span>`,
                tip: "Arrays.sort() for primitives uses Dual-Pivot Quicksort. It is not stable for primitives but very fast.",
                quizzes: [
                    { 
                        q: "How do you get array length?", 
                        opts: ["arr.size()", "arr.length", "arr.length()", "arr.count"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. .size() is used for Collections like ArrayList, not for primitive arrays.",
                            "Correct! Arrays use a public final field called 'length'.",
                            "Incorrect. .length() is a method used for Strings, not arrays.",
                            "Incorrect. 'count' is not a standard Java property for arrays."
                        ]
                    },
                    { 
                        q: "Which method fills an array with a value?", 
                        opts: ["Arrays.set()", "Arrays.fill()", "Arrays.put()", "Arrays.init()"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. There is no standard Arrays.set() for bulk filling.",
                            "Correct! Arrays.fill(arr, val) is the built-in way to populate an entire array.",
                            "Incorrect. .put() is a Map method.",
                            "Incorrect. .init() is not a method in the Arrays utility class."
                        ]
                    },
                    { 
                        q: "What is the time complexity of Arrays.sort()?", 
                        opts: ["O(N)", "O(N²)", "O(N log N)", "O(log N)"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. O(N) is only possible for specialized sorts like Counting Sort.",
                            "Incorrect. O(N²) is the worst case for simple quicksort, but Java uses optimized versions that average O(N log N).",
                            "Correct! Java's dual-pivot quicksort and TimSort both guarantee O(N log N) performance.",
                            "Incorrect. O(log N) is for searching in a sorted array, not for sorting a raw one."
                        ]
                    }
                ]
            },
            {
                id: 2,
                label: "Strings",
                icon: "🧵",
                badge: "Pillar 3",
                intro: "Strings are immutable. Use StringBuilder for building to avoid O(N²) complexity.",
                code: `String s = <span class="str">"abc"</span>;
<span class="kw">int</span> len = s.length(); <span class="cm">// Method, has ()</span>
StringBuilder sb = <span class="kw">new</span> StringBuilder();
sb.append(<span class="str">"xyz"</span>).reverse();`,
                tip: "Never use '==' for String comparison. It compares memory references, not the actual text.",
                quizzes: [
                    { 
                        q: "What does s.substring(1, 3) return for 'hello'?", 
                        opts: ["'el'", "'ell'", "'he'", "'hel'"], 
                        ans: 0, 
                        explains: [
                            "Correct! Indices 1 ('e') and 2 ('l') are included. Index 3 ('l') is the exclusive end.",
                            "Incorrect. The end index in substring(start, end) is exclusive, so it only takes up to index 2.",
                            "Incorrect. 'he' would be indices 0 and 1. Indices 1 to 3 start at 'e'.",
                            "Incorrect. 'hel' would be substring(0, 3)."
                        ]
                    },
                    { 
                        q: "Which is more efficient for joining 1000 strings?", 
                        opts: ["String +", "StringBuilder", "StringBuffer", "String.concat()"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. Each '+' creates a new String object and copies all previous characters, resulting in O(N²) time.",
                            "Correct! StringBuilder uses a mutable internal buffer, making appends O(1) amortized.",
                            "Incorrect. StringBuffer is synchronized (thread-safe), which makes it slower than StringBuilder for single-threaded loops.",
                            "Incorrect. .concat() has the same immutability issues as the '+' operator."
                        ]
                    },
                    { 
                        q: "How to compare String values?", 
                        opts: ["s1 == s2", "s1.is(s2)", "s1.equals(s2)", "s1 === s2"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. '==' checks if they point to the same memory location, which fails if the strings were created differently.",
                            "Incorrect. There is no .is() method for strings in Java.",
                            "Correct! .equals() compares the actual character sequences inside the strings.",
                            "Incorrect. '===' is a JavaScript operator; it does not exist in Java."
                        ]
                    }
                ]
            },
            {
                id: 3,
                label: "Lists & Maps",
                icon: "🗺️",
                badge: "Pillar 4",
                intro: "Dynamic arrays and Key-Value stores. The core of modern problem solving.",
                code: `List&lt;Integer&gt; list = <span class="kw">new</span> ArrayList&lt;&gt;();
Map&lt;String, Integer&gt; map = <span class="kw">new</span> HashMap&lt;&gt;();
map.put(x, map.getOrDefault(x, <span class="num">0</span>) + <span class="num">1</span>);`,
                tip: "getOrDefault() is the most powerful method for frequency counting. Use it to avoid 'if contains' checks.",
                quizzes: [
                    { 
                        q: "Which Map method handles missing keys cleanly?", 
                        opts: ["get()", "fetch()", "getOrDefault()", "find()"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. .get() returns null if the key is missing, which can cause NullPointerExceptions.",
                            "Incorrect. .fetch() is not a Map method.",
                            "Correct! .getOrDefault(key, fallback) returns the value if present, or the fallback if missing.",
                            "Incorrect. .find() is not a Map method."
                        ]
                    },
                    { 
                        q: "Average complexity of HashMap.get()?", 
                        opts: ["O(1)", "O(N)", "O(log N)", "O(N log N)"], 
                        ans: 0, 
                        explains: [
                            "Correct! Hashing allows direct access to the bucket, making it constant time on average.",
                            "Incorrect. O(N) only happens in the rare worst case of extreme hash collisions.",
                            "Incorrect. O(log N) is for TreeMaps, not HashMaps.",
                            "Incorrect. O(N log N) is for sorting, not map lookup."
                        ]
                    },
                    { 
                        q: "Which list method adds an element?", 
                        opts: ["put()", "insert()", "add()", "push()"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. .put() is for Maps.",
                            "Incorrect. .insert() is not a standard List method (it's .add(index, value)).",
                            "Correct! .add(element) is the standard way to append to an ArrayList.",
                            "Incorrect. .push() is for Stacks/Deques."
                        ]
                    }
                ]
            },
            {
                id: 4,
                label: "Stacks & Queues",
                icon: "🥞",
                badge: "Pillar 5",
                intro: "LIFO and FIFO structures. Deque is the modern interface for both.",
                code: `Deque&lt;Integer&gt; dq = <span class="kw">new</span> ArrayDeque&lt;&gt;();
dq.push(<span class="num">1</span>); <span class="cm">// Stack (LIFO)</span>
dq.offer(<span class="num">1</span>); <span class="cm">// Queue (FIFO)</span>
PriorityQueue&lt;Integer&gt; pq = <span class="kw">new</span> PriorityQueue&lt;&gt;();`,
                tip: "Avoid the 'Stack' class; it is synchronized and legacy. Always use ArrayDeque for stack operations.",
                quizzes: [
                    { 
                        q: "Which class should you use for a Stack?", 
                        opts: ["Stack", "ArrayList", "ArrayDeque", "LinkedList"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. While 'Stack' exists, it is a legacy class that is synchronized (slow).",
                            "Incorrect. ArrayList doesn't provide stack-specific methods like .push() or .pop().",
                            "Correct! ArrayDeque is the modern, non-synchronized, and faster implementation for stacks.",
                            "Incorrect. LinkedList can be used but is generally slower due to node object overhead."
                        ]
                    },
                    { 
                        q: "Default PriorityQueue order?", 
                        opts: ["Random", "Descending", "Ascending (Min-Heap)", "LIFO"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. It is strictly ordered by priority.",
                            "Incorrect. To get descending (Max-Heap), you must provide Collections.reverseOrder().",
                            "Correct! By default, the smallest element is kept at the top (Min-Heap).",
                            "Incorrect. LIFO is for Stacks."
                        ]
                    },
                    { 
                        q: "Queue method to remove front?", 
                        opts: ["pop()", "poll()", "remove()", "extract()"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. .pop() is a Stack method.",
                            "Correct! .poll() retrieves and removes the head, returning null if empty.",
                            "Incorrect. .remove() works but throws an exception if the queue is empty, which is riskier.",
                            "Incorrect. .extract() is not a Queue method."
                        ]
                    }
                ]
            },
            {
                id: 5,
                label: "Custom Sorting",
                icon: "⚖️",
                badge: "Pillar 6",
                intro: "Lambdas and Comparators for complex data logic.",
                code: `Arrays.sort(arr, (a, b) -> a[<span class="num">0</span>] - b[<span class="num">0</span>]);
Collections.sort(list, (a, b) -> b - a); <span class="cm">// Descending</span>`,
                tip: "Use Integer.compare(a, b) instead of a - b to safely handle large values and prevent overflow.",
                quizzes: [
                    { 
                        q: "What does (a, b) -> b - a do?", 
                        opts: ["Ascending Sort", "Descending Sort", "No Sort", "Errors out"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. (a - b) is the standard for Ascending.",
                            "Correct! Reversing the subtraction (b - a) flips the comparison logic to Descending.",
                            "Incorrect. It definitely sorts.",
                            "Incorrect. This is valid lambda syntax in Java."
                        ]
                    },
                    { 
                        q: "How to sort a list of objects?", 
                        opts: ["list.sort()", "Arrays.sort(list)", "Collections.sort(list)", "list.orderBy()"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. While list.sort() exists since Java 8, Collections.sort() is the traditional utility method most developers use.",
                            "Incorrect. Arrays.sort() is for fixed-size arrays, not Lists.",
                            "Correct! Collections.sort() is the standard utility for sorting any List implementation.",
                            "Incorrect. .orderBy() is a SQL/LINQ term, not a Java Collection method."
                        ]
                    },
                    { 
                        q: "What happens if a comparator returns 0?", 
                        opts: ["Error", "Elements are equal", "First is smaller", "Infinite Loop"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. Returning 0 is perfectly valid.",
                            "Correct! 0 signals to the sort algorithm that both elements have equal rank.",
                            "Incorrect. A negative value signals the first is smaller.",
                            "Incorrect. Sorting algorithms handle equality gracefully."
                        ]
                    }
                ]
            },
            {
                id: 6,
                label: "Recursion & Memo",
                icon: "🔄",
                badge: "Pillar 7",
                intro: "The fundamental pattern for DFS and Dynamic Programming.",
                code: `<span class="kw">if</span> (n <= <span class="num">1</span>) <span class="kw">return</span> n; <span class="cm">// Base Case</span>
<span class="kw">if</span> (memo[n] != <span class="num">0</span>) <span class="kw">return</span> memo[n]; <span class="cm">// Memo check</span>`,
                tip: "Memoization turns exponential time O(2^N) into linear time O(N) by storing results of subproblems.",
                quizzes: [
                    { 
                        q: "What happens without a base case?", 
                        opts: ["Infinite loop", "StackOverflowError", "MemoryLeak", "NullPointer"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. In recursion, it's not a loop, but a series of function calls on the stack.",
                            "Correct! Each call adds a frame to the stack. Without a stop condition, it exceeds memory limits.",
                            "Incorrect. Memory leaks are different from stack exhaustion.",
                            "Incorrect. This only happens if you try to access a null object."
                        ]
                    },
                    { 
                        q: "What is Memoization?", 
                        opts: ["Looping", "Sorting", "Caching results", "Deleting data"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. Looping is iteration.",
                            "Incorrect. Sorting is unrelated.",
                            "Correct! It involves storing the results of expensive function calls to avoid repeating them.",
                            "Incorrect. It's the opposite—it's about keeping data."
                        ]
                    },
                    { 
                        q: "Recursion is usually replaced by what?", 
                        opts: ["Sorting", "Iteration", "Hashing", "Inheritance"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. Sorting doesn't replace the logic flow of recursion.",
                            "Correct! Standard loops (for/while) can replace recursion to avoid stack overhead.",
                            "Incorrect. Hashing is for lookups.",
                            "Incorrect. Inheritance is an OOP concept."
                        ]
                    }
                ]
            },
            {
                id: 7,
                label: "Binary & Math",
                icon: "♾️",
                badge: "Pillar 8",
                intro: "Bit manipulation and numeric utilities for edge cases.",
                code: `<span class="kw">int</span> xor = a ^ b; <span class="cm">// find unique</span>
<span class="kw">int</span> mid = low + (high - low) / <span class="num">2</span>; <span class="cm">// safe mid</span>`,
                tip: "Use 'low + (high - low) / 2' instead of '(low + high) / 2' to prevent integer overflow for large indices.",
                quizzes: [
                    { 
                        q: "Result of 5 ^ 5?", 
                        opts: ["10", "25", "0", "1"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. XOR is not addition.",
                            "Incorrect. XOR is not multiplication.",
                            "Correct! Any bit XORed with itself is 0, so any number XORed with itself is 0.",
                            "Incorrect. 1 would be the result of a bitwise check if odd."
                        ]
                    },
                    { 
                        q: "How to check if n is even using bits?", 
                        opts: ["n % 2 == 0", "n & 1 == 0", "n | 1 == 0", "n ^ 1 == 0"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. This is mathematically correct but uses the modulo operator, not bitwise logic.",
                            "Correct! If the least significant bit (binary 1) is 0, the number must be even.",
                            "Incorrect. Bitwise OR with 1 would force the number to be odd.",
                            "Incorrect. Bitwise XOR flips the last bit, it doesn't check it."
                        ]
                    },
                    { 
                        q: "What is Integer.MAX_VALUE + 1?", 
                        opts: ["Error", "Infinity", "Integer.MIN_VALUE", "0"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. Java does not throw an error on integer overflow.",
                            "Incorrect. Integers are finite; they don't reach infinity, they wrap.",
                            "Correct! Due to two's complement representation, exceeding the max positive value wraps to the max negative.",
                            "Incorrect. It doesn't reset to zero unless the specific binary carry allows it."
                        ]
                    }
                ]
            },
            {
                id: 8,
                label: "Method Signatures",
                icon: "🖋️",
                badge: "Pillar 9",
                intro: "Returning complex types and handling nested collections.",
                code: `List&lt;List&lt;Integer&gt;&gt; res = <span class="kw">new</span> ArrayList&lt;&gt;();
<span class="kw">return new int</span>[<span class="num">0</span>]; <span class="cm">// empty array return</span>`,
                tip: "Always prefer returning an empty collection (Collections.emptyList()) rather than null to avoid NullPointerExceptions.",
                quizzes: [
                    { 
                        q: "Better return for no results?", 
                        opts: ["null", "new ArrayList()", "Collections.emptyList()", "-1"], 
                        ans: 2, 
                        explains: [
                            "Incorrect. Returning null forces the caller to do a null-check, or risk a crash.",
                            "Incorrect. Creating a new ArrayList object consumes memory unnecessarily if it's going to stay empty.",
                            "Correct! It returns a reusable, immutable empty list object—saving memory and avoiding null checks.",
                            "Incorrect. -1 is a sentinel for primitive 'int', not for collection returns."
                        ]
                    },
                    { 
                        q: "How to return a 1D array on the fly?", 
                        opts: ["return {1,2}", "return new int[]{1,2}", "return int[2]{1,2}", "return [1,2]"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. Bare curly braces are only for variable initialization.",
                            "Correct! This is the syntax for creating an 'anonymous' array for an immediate return.",
                            "Incorrect. You cannot specify size and values in that specific way.",
                            "Incorrect. This is JavaScript syntax."
                        ]
                    },
                    { 
                        q: "Type for nested list results?", 
                        opts: ["List[]", "List<List<T>>", "Matrix<T>", "ArrayList<IntArray>"], 
                        ans: 1, 
                        explains: [
                            "Incorrect. An array of lists is different and less flexible than a nested list.",
                            "Correct! This is the standard way to return structures like level-order tree traversals or permutations.",
                            "Incorrect. Matrix is not a built-in Java Collection type.",
                            "Incorrect. IntArray is not a standard Java class (unless using specialized libraries)."
                        ]
                    }
                ]
            }
        ];

        let current = parseInt(localStorage.getItem('java_dsa_current')) || 0;
        let completed = new Set(JSON.parse(localStorage.getItem('java_dsa_completed')) || []);
        let stats = JSON.parse(localStorage.getItem('java_dsa_stats')) || pillars.map(() => ({ correct: 0, wrong: 0, attempts: 0 }));
        let quizDone = false;
        let currentQuizIndex = 0;
        let currentView = 'step';

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (query.length > 0) {
                renderSearchResults(query);
            } else {
                render();
            }
        }

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            if (view === 'step') document.getElementById('stepViewBtn').classList.add('active');
            if (view === 'cheat') document.getElementById('cheatViewBtn').classList.add('active');
            if (view === 'analysis') document.getElementById('analysisViewBtn').classList.add('active');
            
            document.getElementById('stepHeader').style.display = view === 'step' ? 'block' : 'none';
            render();
        }

        function render() {
            const main = document.getElementById('mainContent');
            if (currentView === 'cheat') {
                renderCheatSheet(main);
            } else if (currentView === 'analysis') {
                renderAnalysis(main);
            } else {
                renderStep(main);
            }
        }

        function renderStep(main) {
            const p = pillars[current];
            const q = p.quizzes[currentQuizIndex];

            updateProgress();

            document.getElementById('pillNav').innerHTML = pillars.map((x, i) => {
                let statusClass = '';
                if (completed.has(i)) statusClass = 'completed';
                if (stats[i].attempts > 0 && stats[i].wrong > stats[i].correct) statusClass = 'struggling';
                
                return `
                <button class="pill ${i === current ? 'active' : ''} ${statusClass}" onclick="goto(${i})">
                    ${completed.has(i) ? '✓ ' : x.icon + ' '}${x.label}
                </button>`;
            }).join('');

            main.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title"><span class="icon">${p.icon}</span> ${p.label}</div>
                        <span class="badge">${p.badge} — ${current + 1}/${pillars.length}</span>
                    </div>
                    <p class="intro">${p.intro}</p>
                    <div class="snippet-container">
                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                        <pre class="snippet">${p.code}</pre>
                    </div>
                    <div class="tip-box"><strong>Pro Tip</strong> ${p.tip}</div>

                    <div class="quiz-section">
                        <p class="quiz-q"><span>❓</span> ${q.q}</p>
                        <div class="quiz-options">
                            ${q.opts.map((o, i) => `<button class="quiz-opt" onclick="answer(${i}, this)">${o}</button>`).join('')}
                        </div>
                        <div id="feedback" class="feedback" style="display: ${quizDone ? 'block' : 'none'}"></div>
                    </div>

                    <div class="nav-btns">
                        <button class="nav-btn" onclick="goto(${current - 1})" ${current === 0 ? 'disabled' : ''}>← Previous</button>
                        <button class="nav-btn primary" id="nextBtn" onclick="nextPillar()" ${(quizDone || completed.has(current)) ? '' : 'disabled'}>
                            ${current === pillars.length - 1 ? 'See Analysis 📈' : 'Continue →'}
                        </button>
                    </div>
                </div>`;
            
            if (quizDone) {
                 const fb = document.getElementById('feedback');
                 const opts = document.querySelectorAll('.quiz-opt');
                 opts[q.ans].classList.add('correct');
                 fb.className = 'feedback ok';
                 fb.innerHTML = `
                    <span class="feedback-title">Correct!</span>
                    <span class="feedback-content">${q.explains[q.ans]}</span>
                `;
            }
        }

        function renderCheatSheet(main) {
            main.innerHTML = `<div class="cheat-sheet-grid" style="display: grid; gap: 2rem;">
                ${pillars.map(p => `
                    <div class="card" style="margin-bottom: 0;">
                        <h3>${p.icon} ${p.label}</h3>
                        <pre class="snippet" style="margin: 1rem 0;">${p.code}</pre>
                        <p style="font-size: 0.85rem; color: var(--text-secondary)">${p.tip}</p>
                    </div>`).join('')}
            </div>`;
        }

        function renderAnalysis(main) {
            const totalCorrect = stats.reduce((acc, s) => acc + s.correct, 0);
            const totalAttempts = stats.reduce((acc, s) => acc + s.attempts, 0);
            const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
            
            let level = "Beginner";
            if (accuracy > 50) level = "Competent";
            if (accuracy > 80 && completed.size === pillars.length) level = "Master";

            const strengths = [];
            const weaknesses = [];

            stats.forEach((s, i) => {
                const score = s.attempts > 0 ? (s.correct / s.attempts) : 0;
                if (score >= 0.7 && s.attempts > 0) strengths.push(pillars[i].label);
                if (score < 0.5 && s.attempts > 0) weaknesses.push(pillars[i].label);
            });

            main.innerHTML = `
                <div class="card" style="animation: fadeIn 0.8s ease-out;">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <h2 style="font-size: 1.8rem;">Skill Profile Analysis</h2>
                        <div style="font-size: 3rem; margin: 1rem 0;">${accuracy > 80 ? '🚀' : accuracy > 50 ? '⚙️' : '🌱'}</div>
                        <p style="color: var(--text-secondary)">Your Current Level: <strong style="color: var(--accent-primary)">${level}</strong></p>
                        <p style="font-size: 0.9rem;">Overall Accuracy: ${accuracy}% (${totalCorrect}/${totalAttempts})</p>
                    </div>

                    <div class="analysis-container">
                        ${pillars.map((p, i) => {
                            const score = stats[i].attempts > 0 ? Math.round((stats[i].correct / stats[i].attempts) * 100) : 0;
                            return `
                                <div class="analysis-row">
                                    <div class="analysis-label">${p.label}</div>
                                    <div class="analysis-bar-container">
                                        <div class="analysis-bar" style="width: ${score}%; background: ${score > 70 ? 'var(--success)' : score > 40 ? 'var(--warning)' : 'var(--error)'}"></div>
                                    </div>
                                    <div class="analysis-score">${score}%</div>
                                </div>`;
                        }).join('')}
                    </div>

                    <div style="margin-top: 2.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <div>
                            <h4 style="color: var(--success); margin-bottom: 0.5rem;">Strengths</h4>
                            <p style="font-size: 0.9rem; color: var(--text-secondary)">
                                ${strengths.length > 0 ? strengths.join(', ') : 'Not enough data yet.'}
                            </p>
                        </div>
                        <div>
                            <h4 style="color: var(--error); margin-bottom: 0.5rem;">Weaknesses</h4>
                            <p style="font-size: 0.9rem; color: var(--text-secondary)">
                                ${weaknesses.length > 0 ? weaknesses.join(', ') : 'Keep practicing to identify gaps.'}
                            </p>
                        </div>
                    </div>

                    <div style="margin-top: 2.5rem; padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: var(--radius-md); border: 1px solid var(--card-border);">
                        <h4 style="margin-bottom: 0.5rem;">Personalized Recommendation</h4>
                        <p style="font-size: 0.925rem; color: var(--text-secondary); line-height: 1.6;">
                            ${weaknesses.length > 0 ? 
                                `Focus on mastering <strong>${weaknesses[0]}</strong> next. Problems in this area often appear in early-round technical screenings.` : 
                                accuracy > 0 ? "You're doing great! Try solving some Medium level problems on LeetCode to test these concepts in complex scenarios." :
                                "Start with Pillar 1 to build your foundation."}
                        </p>
                    </div>
                </div>`;
        }

        function answer(i, el) {
            if (quizDone) return;
            const p = pillars[current];
            const q = p.quizzes[currentQuizIndex];
            const fb = document.getElementById('feedback');
            const opts = document.querySelectorAll('.quiz-opt');
            
            quizDone = true;
            fb.style.display = 'block';
            stats[current].attempts++;

            if (i === q.ans) {
                el.classList.add('correct');
                fb.className = 'feedback ok';
                fb.innerHTML = `
                    <span class="feedback-title">Correct!</span>
                    <span class="feedback-content">${q.explains[i]}</span>
                `;
                completed.add(current);
                stats[current].correct++;
                if (completed.size === pillars.length) triggerConfetti();
                document.getElementById('nextBtn').disabled = false;
                updateProgress();
            } else {
                el.classList.add('wrong');
                opts[q.ans].classList.add('correct');
                fb.className = 'feedback bad';
                fb.innerHTML = `
                    <span class="feedback-title">Not Quite</span>
                    <span class="feedback-content">${q.explains[i]}</span>
                    <span class="correct-answer-hint">The correct answer is: ${q.opts[q.ans]}</span>
                `;
                stats[current].wrong++;
                document.getElementById('nextBtn').disabled = false;
            }
            save();
            const pillBtns = document.querySelectorAll('.pill');
            if (pillBtns[current]) {
                if (completed.has(current)) pillBtns[current].className = 'pill active completed';
                else if (stats[current].wrong > stats[current].correct) pillBtns[current].className = 'pill active struggling';
            }
        }

        function nextPillar() {
            if (current < pillars.length - 1) {
                goto(current + 1);
            } else {
                setView('analysis');
            }
        }

        function goto(i) {
            if (i < 0 || i >= pillars.length) return;
            current = i;
            quizDone = false;
            currentQuizIndex = Math.floor(Math.random() * pillars[i].quizzes.length);
            save();
            render();
        }

        function updateProgress() {
            const progPercent = (completed.size / pillars.length) * 100;
            const progEl = document.getElementById('prog');
            if (progEl) progEl.style.width = progPercent + '%';
        }

        function save() {
            localStorage.setItem('java_dsa_current', current);
            localStorage.setItem('java_dsa_completed', JSON.stringify([...completed]));
            localStorage.setItem('java_dsa_stats', JSON.stringify(stats));
        }

        function resetProgress() {
            if (confirm("Reset everything?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        function copyCode(btn) {
            const code = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(code).then(() => {
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = 'Copy', 2000);
            });
        }

        function triggerConfetti() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#818cf8', '#34d399'] });
        }

        render();
    </script>
</body>
</html>
