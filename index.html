<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java DSA Interactive Mastery | Syntax & Patterns</title>
    <meta name="description" content="A premium interactive learning tool for mastering Java syntax for Data Structures and Algorithms.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            /* Color Palette - Premium Dark Theme */
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #818cf8;
            --accent-secondary: #6366f1;
            --success: #34d399;
            --error: #fb7185;
            --warning: #fbbf24;
            --code-bg: #1e293b;
            
            /* Spacing & Radii */
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            
            /* Fonts */
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(129, 140, 248, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.12) 0px, transparent 50%);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 850px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #a5b4fc, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .search-box {
            position: relative;
            flex: 1;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 10px 16px 10px 40px;
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .view-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: var(--radius-md);
            border: 1px solid var(--card-border);
        }

        .view-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: var(--accent-primary);
            color: white;
        }

        /* Progress Bar */
        .progress-container {
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 999px;
            margin-bottom: 2rem;
            overflow: hidden;
            border: 1px solid var(--card-border);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            width: 0%;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 10px rgba(129, 140, 248, 0.4);
        }

        /* Navigation Pills */
        .pill-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pill:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .pill.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .pill.completed {
            border-color: var(--success);
            color: var(--success);
        }

        .pill.struggling {
            border-color: var(--error);
            color: var(--error);
        }

        /* Main Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0.8;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            background: rgba(129, 140, 248, 0.1);
            color: var(--accent-primary);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .intro {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        /* Code Snippet */
        .snippet-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .snippet {
            background: var(--code-bg);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            line-height: 1.7;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        /* Syntax Highlighting */
        .kw { color: #818cf8; font-weight: 500; } /* Keyword */
        .cm { color: #64748b; font-style: italic; } /* Comment */
        .str { color: #34d399; } /* String */
        .num { color: #fbbf24; } /* Number */
        .typ { color: #38bdf8; } /* Type */
        .mtd { color: #f472b6; } /* Method */

        .tip-box {
            background: rgba(129, 140, 248, 0.05);
            border-left: 4px solid var(--accent-primary);
            padding: 1rem 1.25rem;
            border-radius: var(--radius-sm);
            margin-bottom: 2rem;
            font-size: 0.925rem;
            color: #c7d2fe;
        }

        .tip-box strong {
            color: var(--accent-primary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 4px;
        }

        /* Quiz Section */
        .quiz-section {
            border-top: 1px solid var(--card-border);
            padding-top: 2rem;
        }

        .quiz-q {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 600px) {
            .quiz-options { grid-template-columns: 1fr; }
        }

        .quiz-opt {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 14px;
            border-radius: var(--radius-md);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            font-family: inherit;
        }

        .quiz-opt:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .quiz-opt.correct {
            background: rgba(52, 211, 153, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        .quiz-opt.wrong {
            background: rgba(251, 113, 133, 0.1);
            border-color: var(--error);
            color: var(--error);
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1.25rem;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            display: none;
            animation: slideIn 0.3s ease-out;
            line-height: 1.5;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.ok { background: rgba(52, 211, 153, 0.05); color: var(--success); border: 1px solid rgba(52, 211, 153, 0.2); }
        .feedback.bad { background: rgba(251, 113, 133, 0.05); color: var(--error); border: 1px solid rgba(251, 113, 133, 0.2); }

        /* Navigation Buttons */
        .nav-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 2.5rem;
            gap: 1rem;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .nav-btn.primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Analysis Table */
        .analysis-container {
            margin-top: 2rem;
            width: 100%;
        }

        .analysis-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--card-border);
        }

        .analysis-label {
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .analysis-bar-container {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
            margin: 0 1.5rem;
            overflow: hidden;
        }

        .analysis-bar {
            height: 100%;
            background: var(--accent-primary);
            border-radius: 999px;
            transition: width 1s ease-out;
        }

        .analysis-score {
            font-size: 0.85rem;
            color: var(--text-secondary);
            width: 60px;
            text-align: right;
        }

        /* Reset Button */
        .reset-btn {
            display: block;
            margin: 2rem auto 0;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.6;
        }

        .reset-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Java DSA Mastery</h1>
            <p>Adaptive quizzes that analyze your weaknesses and track your growth.</p>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Search syntax (e.g. 'sort', 'map')..." oninput="handleSearch()">
            </div>
            <div class="view-toggle">
                <button id="stepViewBtn" class="view-btn active" onclick="setView('step')">Learning</button>
                <button id="cheatViewBtn" class="view-btn" onclick="setView('cheat')">Cheat Sheet</button>
                <button id="analysisViewBtn" class="view-btn" onclick="setView('analysis')">Analysis</button>
            </div>
        </div>

        <div id="stepHeader">
            <div class="progress-container">
                <div class="progress-fill" id="prog"></div>
            </div>
            <nav class="pill-nav" id="pillNav"></nav>
        </div>

        <main id="mainContent"></main>

        <button class="reset-btn" onclick="resetProgress()">Reset All Progress</button>
    </div>

    <script>
        const pillars = [
            {
                id: 0,
                label: "Data Types",
                icon: "💎",
                badge: "Pillar 1",
                intro: "Core primitives and essential character arithmetic used in String manipulation.",
                code: `<span class="kw">int</span> n = <span class="num">10</span>;
<span class="kw">long</span> big = <span class="num">10_000_000_000L</span>;

<span class="cm">// Char arithmetic - essential for hashing</span>
<span class="kw">char</span> ch = <span class="str">'e'</span>;
<span class="kw">int</span> pos = ch - <span class="str">'a'</span>;    <span class="cm">// → 4</span>`,
                tip: "The 'ch - 'a'' trick is the most common way to build frequency maps for anagram problems without using a full HashMap.",
                quizzes: [
                    { q: "What does 'c' - 'a' evaluate to?", opts: ["1", "2", "3", "67"], ans: 1, explain: "'a'=0, 'b'=1, 'c'=2." },
                    { q: "Which type should you use for numbers exceeding 2 billion?", opts: ["int", "short", "long", "float"], ans: 2, explain: "int has a max value of ~2.1 billion. Use long for larger numbers." },
                    { q: "What is the ASCII value of 'A'?", opts: ["65", "97", "48", "0"], ans: 0, explain: "'A' is 65, 'a' is 97." }
                ]
            },
            {
                id: 1,
                label: "Arrays",
                icon: "📊",
                badge: "Pillar 2",
                intro: "Fixed-size collections. Mastering length access and static utility methods.",
                code: `<span class="kw">int</span>[] arr = {<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>};
<span class="kw">int</span> len = arr.length; <span class="cm">// Field, no ()</span>
Arrays.sort(arr);      <span class="cm">// O(n log n)</span>`,
                tip: "Arrays.sort() for primitives uses Dual-Pivot Quicksort. It is not stable for primitives but very fast.",
                quizzes: [
                    { q: "How do you get array length?", opts: ["arr.size()", "arr.length", "arr.length()", "arr.count"], ans: 1, explain: "Arrays use .length (field)." },
                    { q: "Which method fills an array with a value?", opts: ["Arrays.set()", "Arrays.fill()", "Arrays.put()", "Arrays.init()"], ans: 1, explain: "Arrays.fill(arr, val) is the standard method." },
                    { q: "What is the time complexity of Arrays.sort()?", opts: ["O(N)", "O(N²)", "O(N log N)", "O(log N)"], ans: 2, explain: "It uses Quicksort/TimSort which are O(N log N)." }
                ]
            },
            {
                id: 2,
                label: "Strings",
                icon: "🧵",
                badge: "Pillar 3",
                intro: "Strings are immutable. Use StringBuilder for building to avoid O(N²) complexity.",
                code: `String s = <span class="str">"abc"</span>;
<span class="kw">int</span> len = s.length(); <span class="cm">// Method, has ()</span>
StringBuilder sb = <span class="kw">new</span> StringBuilder();
sb.append(<span class="str">"xyz"</span>).reverse();`,
                tip: "Never use '==' for String comparison. It compares memory references, not the actual text.",
                quizzes: [
                    { q: "What does s.substring(1, 3) return for 'hello'?", opts: ["'el'", "'ell'", "'he'", "'hel'"], ans: 0, explain: "End index is exclusive. Indices 1 and 2 are 'e' and 'l'." },
                    { q: "Which is more efficient for joining 1000 strings?", opts: ["String +", "StringBuilder", "StringBuffer", "String.concat()"], ans: 1, explain: "StringBuilder is non-synchronized and much faster than repeated '+' operations." },
                    { q: "How to compare String values?", opts: ["s1 == s2", "s1.is(s2)", "s1.equals(s2)", "s1 === s2"], ans: 2, explain: ".equals() checks value equality." }
                ]
            },
            {
                id: 3,
                label: "Lists & Maps",
                icon: "🗺️",
                badge: "Pillar 4",
                intro: "Dynamic arrays and Key-Value stores. The core of modern problem solving.",
                code: `List&lt;Integer&gt; list = <span class="kw">new</span> ArrayList&lt;&gt;();
Map&lt;String, Integer&gt; map = <span class="kw">new</span> HashMap&lt;&gt;();
map.put(x, map.getOrDefault(x, <span class="num">0</span>) + <span class="num">1</span>);`,
                tip: "getOrDefault() is the most powerful method for frequency counting. Use it to avoid 'if contains' checks.",
                quizzes: [
                    { q: "Which Map method handles missing keys cleanly?", opts: ["get()", "fetch()", "getOrDefault()", "find()"], ans: 2, explain: "getOrDefault(key, default) returns default if key is missing." },
                    { q: "Average complexity of HashMap.get()?", opts: ["O(1)", "O(N)", "O(log N)", "O(N log N)"], ans: 0, explain: "Hashing provides constant time lookup on average." },
                    { q: "Which list method adds an element?", opts: ["put()", "insert()", "add()", "push()"], ans: 2, explain: "ArrayList uses .add()." }
                ]
            },
            {
                id: 4,
                label: "Stacks & Queues",
                icon: "🥞",
                badge: "Pillar 5",
                intro: "LIFO and FIFO structures. Deque is the modern interface for both.",
                code: `Deque&lt;Integer&gt; dq = <span class="kw">new</span> ArrayDeque&lt;&gt;();
dq.push(<span class="num">1</span>); <span class="cm">// Stack (LIFO)</span>
dq.offer(<span class="num">1</span>); <span class="cm">// Queue (FIFO)</span>
PriorityQueue&lt;Integer&gt; pq = <span class="kw">new</span> PriorityQueue&lt;&gt;();`,
                tip: "Avoid the 'Stack' class; it is synchronized and legacy. Always use ArrayDeque for stack operations.",
                quizzes: [
                    { q: "Which class should you use for a Stack?", opts: ["Stack", "ArrayList", "ArrayDeque", "LinkedList"], ans: 2, explain: "ArrayDeque is faster and the modern standard for Stacks." },
                    { q: "Default PriorityQueue order?", opts: ["Random", "Descending", "Ascending (Min-Heap)", "LIFO"], ans: 2, explain: "By default, it is a Min-Heap (smallest element at top)." },
                    { q: "Queue method to remove front?", opts: ["pop()", "poll()", "remove()", "extract()"], ans: 1, explain: "poll() returns null if empty, whereas remove() throws exception." }
                ]
            },
            {
                id: 5,
                label: "Custom Sorting",
                icon: "⚖️",
                badge: "Pillar 6",
                intro: "Lambdas and Comparators for complex data logic.",
                code: `Arrays.sort(arr, (a, b) -> a[<span class="num">0</span>] - b[<span class="num">0</span>]);
Collections.sort(list, (a, b) -> b - a); <span class="cm">// Descending</span>`,
                tip: "Use Integer.compare(a, b) instead of a - b to safely handle large values and prevent overflow.",
                quizzes: [
                    { q: "What does (a, b) -> b - a do?", opts: ["Ascending Sort", "Descending Sort", "No Sort", "Errors out"], ans: 1, explain: "b - a reverses the standard order." },
                    { q: "How to sort a list of objects?", opts: ["list.sort()", "Arrays.sort(list)", "Collections.sort(list)", "list.orderBy()"], ans: 2, explain: "Collections.sort() is the standard utility for Lists." },
                    { q: "What happens if a comparator returns 0?", opts: ["Error", "Elements are equal", "First is smaller", "Infinite Loop"], ans: 1, explain: "0 means the elements are considered equal in ranking." }
                ]
            },
            {
                id: 6,
                label: "Recursion & Memo",
                icon: "🔄",
                badge: "Pillar 7",
                intro: "The fundamental pattern for DFS and Dynamic Programming.",
                code: `<span class="kw">if</span> (n <= <span class="num">1</span>) <span class="kw">return</span> n; <span class="cm">// Base Case</span>
<span class="kw">if</span> (memo[n] != <span class="num">0</span>) <span class="kw">return</span> memo[n]; <span class="cm">// Memo check</span>`,
                tip: "Memoization turns exponential time O(2^N) into linear time O(N) by storing results of subproblems.",
                quizzes: [
                    { q: "What happens without a base case?", opts: ["Infinite loop", "StackOverflowError", "MemoryLeak", "NullPointer"], ans: 1, explain: "Recursion depth fills the stack until it overflows." },
                    { q: "What is Memoization?", opts: ["Looping", "Sorting", "Caching results", "Deleting data"], ans: 2, explain: "Caching results of expensive function calls." },
                    { q: "Recursion is usually replaced by what?", opts: ["Sorting", "Iteration", "Hashing", "Inheritance"], ans: 1, explain: "Iteration (loops) can often replace recursion to save stack space." }
                ]
            },
            {
                id: 7,
                label: "Binary & Math",
                icon: "♾️",
                badge: "Pillar 8",
                intro: "Bit manipulation and numeric utilities for edge cases.",
                code: `<span class="kw">int</span> xor = a ^ b; <span class="cm">// find unique</span>
<span class="kw">int</span> mid = low + (high - low) / <span class="num">2</span>; <span class="cm">// safe mid</span>`,
                tip: "Use 'low + (high - low) / 2' instead of '(low + high) / 2' to prevent integer overflow for large indices.",
                quizzes: [
                    { q: "Result of 5 ^ 5?", opts: ["10", "25", "0", "1"], ans: 2, explain: "XOR with self is always 0." },
                    { q: "How to check if n is even using bits?", opts: ["n % 2 == 0", "n & 1 == 0", "n | 1 == 0", "n ^ 1 == 0"], ans: 1, explain: "If the last bit is 0, the number is even." },
                    { q: "What is Integer.MAX_VALUE + 1?", opts: ["Error", "Infinity", "Integer.MIN_VALUE", "0"], ans: 2, explain: "Integers wrap around in Java." }
                ]
            },
            {
                id: 8,
                label: "Method Signatures",
                icon: "🖋️",
                badge: "Pillar 9",
                intro: "Returning complex types and handling nested collections.",
                code: `List&lt;List&lt;Integer&gt;&gt; res = <span class="kw">new</span> ArrayList&lt;&gt;();
<span class="kw">return new int</span>[<span class="num">0</span>]; <span class="cm">// empty array return</span>`,
                tip: "Always prefer returning an empty collection (Collections.emptyList()) rather than null to avoid NullPointerExceptions.",
                quizzes: [
                    { q: "Better return for no results?", opts: ["null", "new ArrayList()", "Collections.emptyList()", "-1"], ans: 2, explain: "emptyList() is memory efficient and prevents NPEs." },
                    { q: "How to return a 1D array on the fly?", opts: ["return {1,2}", "return new int[]{1,2}", "return int[2]{1,2}", "return [1,2]"], ans: 1, explain: "Syntax for anonymous array return." },
                    { q: "Type for nested list results?", opts: ["List[]", "List<List<T>>", "Matrix<T>", "ArrayList<IntArray>"], ans: 1, explain: "Standard way to return levels or permutations." }
                ]
            }
        ];

        let current = parseInt(localStorage.getItem('java_dsa_current')) || 0;
        let completed = new Set(JSON.parse(localStorage.getItem('java_dsa_completed')) || []);
        let stats = JSON.parse(localStorage.getItem('java_dsa_stats')) || pillars.map(() => ({ correct: 0, wrong: 0, attempts: 0 }));
        let quizDone = false;
        let currentQuizIndex = 0;
        let currentView = 'step';

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (query.length > 0) {
                renderSearchResults(query);
            } else {
                render();
            }
        }

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            if (view === 'step') document.getElementById('stepViewBtn').classList.add('active');
            if (view === 'cheat') document.getElementById('cheatViewBtn').classList.add('active');
            if (view === 'analysis') document.getElementById('analysisViewBtn').classList.add('active');
            
            document.getElementById('stepHeader').style.display = view === 'step' ? 'block' : 'none';
            render();
        }

        function render() {
            const main = document.getElementById('mainContent');
            if (currentView === 'cheat') {
                renderCheatSheet(main);
            } else if (currentView === 'analysis') {
                renderAnalysis(main);
            } else {
                renderStep(main);
            }
        }

        function renderStep(main) {
            const p = pillars[current];
            quizDone = false;
            // Pick a random quiz index each time we enter this pillar
            currentQuizIndex = Math.floor(Math.random() * p.quizzes.length);
            const q = p.quizzes[currentQuizIndex];

            updateProgress();

            document.getElementById('pillNav').innerHTML = pillars.map((x, i) => {
                let statusClass = '';
                if (completed.has(i)) statusClass = 'completed';
                // Mark as struggling if wrong > correct and attempts > 0
                if (stats[i].attempts > 0 && stats[i].wrong > stats[i].correct) statusClass = 'struggling';
                
                return `
                <button class="pill ${i === current ? 'active' : ''} ${statusClass}" onclick="goto(${i})">
                    ${completed.has(i) ? '✓ ' : x.icon + ' '}${x.label}
                </button>`;
            }).join('');

            main.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title"><span class="icon">${p.icon}</span> ${p.label}</div>
                        <span class="badge">${p.badge} — ${current + 1}/${pillars.length}</span>
                    </div>
                    <p class="intro">${p.intro}</p>
                    <div class="snippet-container">
                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                        <pre class="snippet">${p.code}</pre>
                    </div>
                    <div class="tip-box"><strong>Pro Tip</strong> ${p.tip}</div>

                    <div class="quiz-section">
                        <p class="quiz-q"><span>❓</span> ${q.q}</p>
                        <div class="quiz-options">
                            ${q.opts.map((o, i) => `<button class="quiz-opt" onclick="answer(${i}, this)">${o}</button>`).join('')}
                        </div>
                        <div id="feedback" class="feedback"></div>
                    </div>

                    <div class="nav-btns">
                        <button class="nav-btn" onclick="goto(${current - 1})" ${current === 0 ? 'disabled' : ''}>← Previous</button>
                        <button class="nav-btn primary" id="nextBtn" onclick="nextPillar()" ${!completed.has(current) ? 'disabled' : ''}>
                            ${current === pillars.length - 1 ? 'See Analysis 📈' : 'Continue →'}
                        </button>
                    </div>
                </div>`;
        }

        function renderCheatSheet(main) {
            main.innerHTML = `<div class="cheat-sheet-grid" style="display: grid; gap: 2rem;">
                ${pillars.map(p => `
                    <div class="card" style="margin-bottom: 0;">
                        <h3>${p.icon} ${p.label}</h3>
                        <pre class="snippet" style="margin: 1rem 0;">${p.code}</pre>
                        <p style="font-size: 0.85rem; color: var(--text-secondary)">${p.tip}</p>
                    </div>`).join('')}
            </div>`;
        }

        function renderAnalysis(main) {
            const totalCorrect = stats.reduce((acc, s) => acc + s.correct, 0);
            const totalAttempts = stats.reduce((acc, s) => acc + s.attempts, 0);
            const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
            
            let level = "Beginner";
            if (accuracy > 50) level = "Competent";
            if (accuracy > 80 && completed.size === pillars.length) level = "Master";

            const strengths = [];
            const weaknesses = [];

            stats.forEach((s, i) => {
                const score = s.attempts > 0 ? (s.correct / s.attempts) : 0;
                if (score >= 0.7 && s.attempts > 0) strengths.push(pillars[i].label);
                if (score < 0.5 && s.attempts > 0) weaknesses.push(pillars[i].label);
            });

            main.innerHTML = `
                <div class="card" style="animation: fadeIn 0.8s ease-out;">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <h2 style="font-size: 1.8rem;">Skill Profile Analysis</h2>
                        <div style="font-size: 3rem; margin: 1rem 0;">${accuracy > 80 ? '🚀' : accuracy > 50 ? '⚙️' : '🌱'}</div>
                        <p style="color: var(--text-secondary)">Your Current Level: <strong style="color: var(--accent-primary)">${level}</strong></p>
                        <p style="font-size: 0.9rem;">Overall Accuracy: ${accuracy}% (${totalCorrect}/${totalAttempts})</p>
                    </div>

                    <div class="analysis-container">
                        ${pillars.map((p, i) => {
                            const score = stats[i].attempts > 0 ? Math.round((stats[i].correct / stats[i].attempts) * 100) : 0;
                            return `
                                <div class="analysis-row">
                                    <div class="analysis-label">${p.label}</div>
                                    <div class="analysis-bar-container">
                                        <div class="analysis-bar" style="width: ${score}%; background: ${score > 70 ? 'var(--success)' : score > 40 ? 'var(--warning)' : 'var(--error)'}"></div>
                                    </div>
                                    <div class="analysis-score">${score}%</div>
                                </div>`;
                        }).join('')}
                    </div>

                    <div style="margin-top: 2.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <div>
                            <h4 style="color: var(--success); margin-bottom: 0.5rem;">Strengths</h4>
                            <p style="font-size: 0.9rem; color: var(--text-secondary)">
                                ${strengths.length > 0 ? strengths.join(', ') : 'Not enough data yet.'}
                            </p>
                        </div>
                        <div>
                            <h4 style="color: var(--error); margin-bottom: 0.5rem;">Weaknesses</h4>
                            <p style="font-size: 0.9rem; color: var(--text-secondary)">
                                ${weaknesses.length > 0 ? weaknesses.join(', ') : 'Keep practicing to identify gaps.'}
                            </p>
                        </div>
                    </div>

                    <div style="margin-top: 2.5rem; padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: var(--radius-md); border: 1px solid var(--card-border);">
                        <h4 style="margin-bottom: 0.5rem;">Personalized Recommendation</h4>
                        <p style="font-size: 0.925rem; color: var(--text-secondary); line-height: 1.6;">
                            ${weaknesses.length > 0 ? 
                                `Focus on mastering <strong>${weaknesses[0]}</strong> next. Problems in this area often appear in early-round technical screenings.` : 
                                accuracy > 0 ? "You're doing great! Try solving some Medium level problems on LeetCode to test these concepts in complex scenarios." :
                                "Start with Pillar 1 to build your foundation."}
                        </p>
                    </div>
                </div>`;
        }

        function answer(i, el) {
            if (quizDone) return;
            const p = pillars[current];
            const q = p.quizzes[currentQuizIndex];
            const fb = document.getElementById('feedback');
            const opts = document.querySelectorAll('.quiz-opt');
            
            quizDone = true;
            fb.style.display = 'block';
            stats[current].attempts++;

            if (i === q.ans) {
                el.classList.add('correct');
                fb.className = 'feedback ok';
                fb.innerHTML = `<strong>Correct!</strong> ${q.explain}`;
                completed.add(current);
                stats[current].correct++;
                if (completed.size === pillars.length) triggerConfetti();
                document.getElementById('nextBtn').disabled = false;
                updateProgress();
            } else {
                el.classList.add('wrong');
                opts[q.ans].classList.add('correct');
                fb.className = 'feedback bad';
                fb.innerHTML = `<strong>Not quite.</strong> ${q.explain}`;
                stats[current].wrong++;
            }
            save();
            // Re-render nav pills to update struggle/complete status
            goto(current);
        }

        function nextPillar() {
            if (current < pillars.length - 1) {
                goto(current + 1);
            } else {
                setView('analysis');
            }
        }

        function goto(i) {
            if (i < 0 || i >= pillars.length) return;
            current = i;
            save();
            render();
        }

        function updateProgress() {
            const progPercent = (completed.size / pillars.length) * 100;
            document.getElementById('prog').style.width = progPercent + '%';
        }

        function save() {
            localStorage.setItem('java_dsa_current', current);
            localStorage.setItem('java_dsa_completed', JSON.stringify([...completed]));
            localStorage.setItem('java_dsa_stats', JSON.stringify(stats));
        }

        function resetProgress() {
            if (confirm("Reset everything?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        function copyCode(btn) {
            const code = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(code).then(() => {
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = 'Copy', 2000);
            });
        }

        function triggerConfetti() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#818cf8', '#34d399'] });
        }

        render();
    </script>
</body>
</html>
